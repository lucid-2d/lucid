name: Auto Implement

# Trigger: issue labeled 'auto' OR daily scan
on:
  issues:
    types: [labeled]
  schedule:
    # Daily at 3:17 AM (off-peak, avoid :00/:30)
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Event-driven: issue labeled 'auto' ──
  implement-issue:
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'auto'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure npm registry
        run: |
          echo "@lucid-2d:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Implement
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH="auto/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

          # Write issue context to file (avoid shell escaping issues)
          cat > /tmp/issue-context.md << 'ISSUE_EOF'
          ${{ github.event.issue.title }}

          ${{ github.event.issue.body }}
          ISSUE_EOF

          # Let Claude implement
          claude -p "$(cat <<'PROMPT'
          You are working on the Lucid 2D game framework (TypeScript, pnpm monorepo).
          Read /tmp/issue-context.md for the issue to implement.

          Rules:
          1. Read relevant existing code FIRST — understand patterns before changing
          2. Implement the feature/fix with minimal, focused changes
          3. Add tests for new functionality
          4. Run: pnpm -r build && pnpm -r test
          5. ALL tests must pass before you stop
          6. If tests fail, fix them — do not skip or disable tests
          7. If stuck after 3 attempts, stop and explain what went wrong

          Do NOT bump version numbers or publish packages.
          PROMPT
          )" --dangerously-skip-permissions

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH="auto/issue-${ISSUE_NUMBER}"

          if [ -z "$(git status --porcelain)" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "No changes produced. Manual implementation needed."
            exit 0
          fi

          git config user.name "lucid-bot"
          git config user.email "bot@lucid-2d.dev"
          git add -A
          git commit -m "feat: implement #${ISSUE_NUMBER} — ${ISSUE_TITLE}

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push origin "$BRANCH"

          gh pr create \
            --title "Auto: ${ISSUE_TITLE}" \
            --body "$(cat <<EOF
          Closes #${ISSUE_NUMBER}

          Automatically implemented by Claude Code.
          CI must pass before merge.
          EOF
          )" \
            --label "auto"

  # ── Daily scan: find issues labeled 'auto' without PRs ──
  daily-scan:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find unprocessed auto issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List open issues with 'auto' label that don't have linked PRs
          ISSUES=$(gh issue list --repo "${{ github.repository }}" --label auto --state open --json number,title --jq '.[].number')

          for ISSUE_NUM in $ISSUES; do
            # Check if a PR already exists for this issue
            EXISTING_PR=$(gh pr list --repo "${{ github.repository }}" --head "auto/issue-${ISSUE_NUM}" --json number --jq 'length')
            if [ "$EXISTING_PR" = "0" ]; then
              echo "Issue #${ISSUE_NUM} needs implementation — re-triggering label event"
              # Remove and re-add label to trigger the implement-issue job
              gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --remove-label auto
              gh issue edit "$ISSUE_NUM" --repo "${{ github.repository }}" --add-label auto
            fi
          done
