<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucid Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 20px;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: #fff;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border: 2px solid #333;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: #000;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  canvas { width: 390px; height: 844px; display: block; }
  .sidebar {
    position: fixed;
    right: 20px;
    top: 20px;
    width: 380px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .scene-switcher {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px;
    display: flex;
    gap: 6px;
  }
  .scene-switcher button {
    flex: 1;
    padding: 6px 0;
    background: #333;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .scene-switcher button:hover { background: #444; color: #fff; }
  .scene-switcher button.active { background: #e94560; border-color: #e94560; color: #fff; }
  .debug-panel {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    flex: 1;
    overflow-y: auto;
    min-height: 200px;
  }
  .debug-panel h3 { color: #ffd166; margin-bottom: 8px; font-size: 13px; }
  .debug-panel pre {
    background: #0f0f23;
    padding: 8px;
    border-radius: 4px;
    white-space: pre-wrap;
    font-size: 11px;
    line-height: 1.4;
    color: #a0a0b0;
    max-height: 50vh;
    overflow-y: auto;
    margin-top: 8px;
  }
  .debug-panel .toolbar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .debug-panel .toolbar button {
    padding: 3px 10px;
    background: #333;
    color: #ccc;
    border: 1px solid #444;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
  }
  .debug-panel .toolbar button:hover { background: #444; color: #fff; }
</style>
</head>
<body>
  <div class="phone-frame">
    <canvas id="game" width="390" height="844"></canvas>
  </div>
  <div class="sidebar">
    <div class="scene-switcher">
      <button class="active" onclick="switchScene('demo')">Game Demo</button>
      <button onclick="switchScene('gallery')">Component Gallery</button>
    </div>
    <div class="debug-panel">
      <h3>Lucid Debug</h3>
      <div class="toolbar">
        <button onclick="showInspect()">$inspect()</button>
        <button onclick="showInteractions()">Interactions</button>
        <button onclick="clearInteractions()">Clear</button>
        <button onclick="showFps()">FPS</button>
      </div>
      <pre id="debug-output">选择上方场景，点击组件查看 $inspect 输出</pre>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
